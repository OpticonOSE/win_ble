name: Build BLEServer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows-helper:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Detect Windows SDK
        id: sdk
        shell: pwsh
        run: |
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\UnionMetadata"
          if (-not (Test-Path $sdkRoot)) {
            Write-Error "Windows SDK metadata root not found: $sdkRoot"
            exit 1
          }

          $sdk = Get-ChildItem $sdkRoot -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
            Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty Name

          if (-not $sdk) {
            Write-Error "No numeric Windows SDK versions found under $sdkRoot"
            exit 1
          }

          Write-Host "Using Windows SDK version: $sdk"
          "version=$sdk" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build BLEServer
        run: msbuild BLEServer/BLEServer.sln /m /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=${{ steps.sdk.outputs.version }}

      - name: Collect built helper
        shell: pwsh
        run: |
          $candidates = @(
            "BLEServer/BLEServer/x64/Release/BLEServer.exe",
            "BLEServer/x64/Release/BLEServer.exe",
            "x64/Release/BLEServer.exe",
            "Release/BLEServer.exe"
          )

          $builtExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $builtExe) {
            Write-Error "Could not find BLEServer.exe after build."
            exit 1
          }

          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $builtExe artifacts/BLEServer.exe
          Copy-Item $builtExe lib/assets/BLEServer.exe

      - name: Upload BLEServer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BLEServer-x64
          path: artifacts/BLEServer.exe

      - name: Upload package asset candidate
        uses: actions/upload-artifact@v4
        with:
          name: BLEServer-package-asset
          path: lib/assets/BLEServer.exe
